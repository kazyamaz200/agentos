name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Lint
        run: |
          go vet ./...

      - name: Build
        run: |
          go build -o agentos ./cmd/agentos

      - name: Test
        run: |
          go test ./... -v

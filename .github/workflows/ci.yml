name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "24"

jobs:
  frontend:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Lint frontend
        working-directory: web
        run: npm run lint

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install chromium

      - name: Responsive smoke
        working-directory: web
        run: npm run smoke

  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l .)"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          skip-cache: true

      - name: go vet
        run: go vet ./...

  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [frontend, lint]
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: go build -o agentos ./cmd/agentos

      - name: Test
        run: go test ./... -v -count=1 -coverprofile=coverage.out

      - name: Upload coverage
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage.out
          fail_ci_if_error: false

  build-macos:
    permissions:
      contents: read
    runs-on: macos-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: go build -o agentos ./cmd/agentos

      - name: Test
        run: go test ./... -v -count=1

  build-windows:
    permissions:
      contents: read
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: go build -o agentos.exe ./cmd/agentos

      - name: Test
        run: go test ./... -v -count=1

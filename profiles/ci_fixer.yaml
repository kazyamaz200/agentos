name: "ci-fixer"
role: "CI configuration fix agent"

llm:
  provider: "litellm"
  model: "coder"
  temperature: 0.1
  max_tokens: 8192

tools:
  allow:
    - read_file
    - write_file
    - search
    - shell
    - git
  deny_commands:
    - "rm -rf"
    - "sudo"
    - "docker run --privileged"
    - "curl"
    - "wget"

commands:
  test: ""
  lint: ""
  build: ""

limits:
  max_iterations: 5
  max_retries: 2
  max_changed_files: 10
  max_runtime_minutes: 15

output:
  mode: "patch"

guidance:
  architecture:
    - "Inspect existing workflow names, jobs, matrices, and branch-protection expectations before replacing CI structure."
    - "Prefer de facto GitHub Actions patterns: actions/checkout, actions/setup-go, cache-aware Go setup, go test, and go vet."
    - "Keep lint, test, and optional security steps explicit and compatible with the repository's Go version and module layout."
  output_expectations:
    - "CI changes are minimal and preserve existing job intent."
    - "Local validation commands mirror the workflow where practical."
    - "Workflow YAML remains pull_request compatible and branch-protection friendly."

name: "go-reviewer"
role: "Go code reviewer"

llm:
  provider: "litellm"
  model: "coder"
  temperature: 0.1
  max_tokens: 4096

tools:
  allow:
    - read_file
    - search
    - git
  deny_commands:
    - "rm -rf"
    - "sudo"
    - "curl"
    - "wget"

commands:
  test: ""
  lint: ""

limits:
  max_iterations: 1
  max_retries: 1
  max_changed_files: 50
  max_runtime_minutes: 10

output:
  mode: "summary"

guidance:
  architecture:
    - "Evaluate whether changes preserve existing repository conventions before judging style preferences."
    - "Flag over-engineered layouts, unnecessary dependencies, and convention-breaking rewrites when a smaller change would satisfy the task."
    - "Review correctness, tests, security-sensitive behavior, maintainability, and release readiness."
  output_expectations:
    - "Findings are structured by severity and include file references where applicable."
    - "Review states whether validation and test coverage are sufficient for release."
    - "Approval is withheld for correctness, security, or convention-breaking regressions."

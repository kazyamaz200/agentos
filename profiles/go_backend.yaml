name: "go-backend-agent"
role: "Go backend coding agent"

llm:
  provider: "litellm"
  model: "coder"
  temperature: 0.2
  max_tokens: 8192

tools:
  allow:
    - read_file
    - write_file
    - search
    - shell
    - git
    - test
  deny_commands:
    - "rm -rf"
    - "sudo"
    - "docker run --privileged"
    - "curl"
    - "wget"
    - "scp"
    - "ssh"

commands:
  test: "go test ./..."
  lint: "go vet ./..."
  build: "go build ./..."

limits:
  max_iterations: 8
  max_retries: 3
  max_changed_files: 20
  max_runtime_minutes: 30

output:
  mode: "patch"

guidance:
  architecture:
    - "Inspect the existing layout before editing and preserve established package, cmd/, internal/, pkg/, api/, router, middleware, and test conventions."
    - "Prefer idiomatic standard-library Go for small services; add frameworks, dependencies, or new top-level layout only when task complexity warrants it."
    - "Separate handlers, configuration, and tests when the repository already uses that structure; avoid over-engineering small repositories."
  output_expectations:
    - "Changed Go source and tests are formatted with gofmt."
    - "go test ./..., go vet ./..., and configured build commands pass."
    - "Architecture choices are summarized when new structure is introduced."

# Default values for agentos Helm chart.
# This is a YAML-formatted file.

# Number of replicas
replicaCount: 1

# Container image
image:
  repository: ghcr.io/kazyamaz200/agentos
  tag: "1.0.0"
  pullPolicy: IfNotPresent

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 101
  fsGroup: 101

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: ClusterIP
  port: 8080

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agentos.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Persistent storage for run artifacts
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# Environment variables
env:
  # LiteLLM proxy URL
  LITELLM_BASE_URL: "http://litellm:4000"
  # Prefer secrets.existingSecret or secrets.litellmApiKey for production.
  LITELLM_API_KEY: ""
  AGENTOS_MODEL_CODER: "coder"
  # Qdrant vector database (optional — falls back to local)
  QDRANT_URL: ""
  QDRANT_API_KEY: ""
  # Server port
  AGENTOS_PORT: "8080"
  # State directory for run artifacts and local vector indexes
  AGENTOS_HOME: "/home/agentos/.agentos"
  # Maximum runtime for a single orchestration subtask
  AGENTOS_ORCHESTRATE_SUBTASK_TIMEOUT: "10m"
  # GitHub token (optional, for PR operations)
  GITHUB_TOKEN: ""

auth:
  required: false
  github:
    clientId: ""
    callbackUrl: ""
    authorizeUrl: "https://github.com/login/oauth/authorize"
    tokenUrl: "https://github.com/login/oauth/access_token"
    userUrl: "https://api.github.com/user"
  cookieSecure: false

llm:
  defaultPreset: "default"
  presets:
    - id: "default"
      name: "Default LiteLLM"
      provider: "litellm"
      baseUrl: "http://litellm:4000"
      model: "coder"
      apiKeyEnv: "LITELLM_API_KEY"

secrets:
  # Set to an existing Secret name to avoid rendering sensitive values from Helm.
  existingSecret: ""
  litellmApiKey: ""
  githubToken: ""
  githubOAuthClientSecret: ""
  agentosSessionSecret: ""

networkPolicy:
  enabled: false
  ingressCIDRs: []

# Probes
probe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentos.fullname" . }}
  labels:
    {{- include "agentos.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentos.selectorLabels" . | nindent 8 }}
    spec:
      {{- $podSecurityContext := default dict (get .Values "podSecurityContext") }}
      {{- $securityContext := default dict (get .Values "securityContext") }}
      {{- $capabilities := default dict (get $securityContext "capabilities") }}
      {{- $env := default dict (get .Values "env") }}
      {{- $secrets := default dict (get .Values "secrets") }}
      {{- $secretName := default (include "agentos.fullname" .) (get $secrets "existingSecret") }}
      securityContext:
        fsGroup: {{ default 101 (get $podSecurityContext "fsGroup") }}
        runAsGroup: {{ default 101 (get $podSecurityContext "runAsGroup") }}
        runAsNonRoot: {{ default true (get $podSecurityContext "runAsNonRoot") }}
        runAsUser: {{ default 100 (get $podSecurityContext "runAsUser") }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: {{ default false (get $securityContext "allowPrivilegeEscalation") }}
            capabilities:
              drop:
                {{- default (list "ALL") (get $capabilities "drop") | toYaml | nindent 16 }}
            readOnlyRootFilesystem: {{ default false (get $securityContext "readOnlyRootFilesystem") }}
          args:
            - serve
            - --port
            - "{{ .Values.env.AGENTOS_PORT }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if .Values.probe.enabled }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.probe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.probe.initialDelaySeconds }}
            periodSeconds: {{ .Values.probe.periodSeconds }}
          {{- end }}
          env:
            - name: HOME
              value: "/home/agentos"
            - name: LITELLM_BASE_URL
              value: "{{ .Values.env.LITELLM_BASE_URL }}"
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: LITELLM_API_KEY
                  optional: true
            - name: AGENTOS_MODEL_CODER
              value: "{{ .Values.env.AGENTOS_MODEL_CODER }}"
            - name: AGENTOS_LLM_DEFAULT_PRESET
              value: "{{ .Values.llm.defaultPreset }}"
            - name: AGENTOS_LLM_PRESETS
              value: {{ toJson .Values.llm.presets | quote }}
            - name: AGENTOS_HOME
              value: "{{ default "/home/agentos/.agentos" (get $env "AGENTOS_HOME") }}"
            - name: AGENTOS_PUBLIC_URL
              value: "{{ get $env "AGENTOS_PUBLIC_URL" }}"
            - name: AGENTOS_ADMIN_USERS
              value: "{{ get $env "AGENTOS_ADMIN_USERS" }}"
            - name: AGENTOS_ORCHESTRATE_SUBTASK_TIMEOUT
              value: "{{ default "10m" (get $env "AGENTOS_ORCHESTRATE_SUBTASK_TIMEOUT") }}"
            - name: QDRANT_URL
              value: "{{ .Values.env.QDRANT_URL }}"
            - name: QDRANT_API_KEY
              value: "{{ .Values.env.QDRANT_API_KEY }}"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: GITHUB_TOKEN
                  optional: true
            - name: GITHUB_APP_ID
              value: "{{ .Values.env.GITHUB_APP_ID }}"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "{{ .Values.env.GITHUB_APP_INSTALLATION_ID }}"
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: GITHUB_APP_PRIVATE_KEY
                  optional: true
            - name: GITHUB_APP_PRIVATE_KEY_FILE
              value: "{{ .Values.env.GITHUB_APP_PRIVATE_KEY_FILE }}"
            - name: AGENTOS_AUTH_REQUIRED
              value: "{{ .Values.auth.required }}"
            - name: GITHUB_OAUTH_CLIENT_ID
              value: "{{ .Values.auth.github.clientId }}"
            - name: GITHUB_OAUTH_CALLBACK_URL
              value: "{{ .Values.auth.github.callbackUrl }}"
            - name: GITHUB_OAUTH_AUTHORIZE_URL
              value: "{{ .Values.auth.github.authorizeUrl }}"
            - name: GITHUB_OAUTH_TOKEN_URL
              value: "{{ .Values.auth.github.tokenUrl }}"
            - name: GITHUB_OAUTH_USER_URL
              value: "{{ .Values.auth.github.userUrl }}"
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: GITHUB_OAUTH_CLIENT_SECRET
                  optional: true
            - name: AGENTOS_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: AGENTOS_SESSION_SECRET
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: runs
              mountPath: /home/agentos/.agentos
      volumes:
        - name: runs
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agentos.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}

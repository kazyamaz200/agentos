apiVersion: agentos.io/v1
kind: Agent
metadata:
  name: ci-fixer
  labels:
    role: ci-fixer
spec:
  llm:
    model: coder
    temperature: 0.2
    maxTokens: 8192
  tools:
    allow:
      - read_file
      - write_file
      - search
      - shell
      - git
      - test
  commands:
    test: go test ./...
    lint: go vet ./...
  limits:
    maxRetries: 3
    maxIterations: 8
